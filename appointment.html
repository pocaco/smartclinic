<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Appointment - SmartClinic</title>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="navonly.css">
  </head>

<body>


<!-- ==================== NAVBAR / HEADER ==================== -->
<nav class="navbar navbar-expand-lg fixed-top" id="mainNavbar">
    <div class="container">
        <a class="navbar-brand" href="#">
            <i class="fa-solid fa-heart-pulse"></i> Smart<span class="brand-plus">Clinic</span>
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navLinks">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navLinks">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link" href="index.html">Home</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="services.html">Services</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="Feedback.html">Feedback</a>
                </li>
            </ul>
        </div>
    </div>
</nav>
<div class="container mt-3">
  <h2 class="text-center">Book Appointment</h2>

  <form id="appointmentForm">

  
    <div class="mb-3">
      <label>Name</label>
      <input type="text" id="name" class="form-control" required>
    </div>

  
    <div class="mb-3">
      <label>Gender</label><br>
      <input type="radio" name="gender" value="Male"> Male
      <input type="radio" name="gender" value="Female"> Female
    </div>

  
    <div class="mb-3">
      <label>Phone</label>
      <input type="text" id="phone" class="form-control" required>
    </div>

  
    <div class="mb-3">
      <label>Email</label>
      <input type="email" id="email" class="form-control" required>
    </div>

   
    <div class="mb-3">
      <label>Service</label>
      <select id="service" class="form-control" required>
        <option value="">Select Service</option>
        <option>General Checkup</option>
        <option>Dental</option>
        <option>Eye Specialist</option>
      </select>
    </div>

   
    <div class="mb-3">
      <label>Date</label>
      <input type="date" id="date" class="form-control" required>
    </div>

    <button type="button" class="btn btn-success w-100" onclick="submitForm()">Submit</button>

  </form>
</div>

<div class="modal fade" id="bookingModal">
  <div class="modal-dialog">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title">Booking Confirmation</h5>
        <button class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body" id="modalContent">
      </div>

    </div>
  </div>
</div>




<script>
function submitForm() {

    let name = document.getElementById("name").value;
    let phone = document.getElementById("phone").value;
    let email = document.getElementById("email").value;
    let service = document.getElementById("service").value;
    let date = document.getElementById("date").value;

    let gender = document.querySelector('input[name="gender"]:checked');

 
    if(name === "" || phone === "" || email === "" || service === "" || date === "" || !gender) {
        alert("Please fill all fields!");
        return;
    }

 
    document.getElementById("modalContent").innerHTML = `
        <p><strong>Name:</strong> ${name}</p>
        <p><strong>Gender:</strong> ${gender.value}</p>
        <p><strong>Phone:</strong> ${phone}</p>
        <p><strong>Email:</strong> ${email}</p>
        <p><strong>Service:</strong> ${service}</p>
        <p><strong>Date:</strong> ${date}</p>
    `;

    let modal = new bootstrap.Modal(document.getElementById('bookingModal'));
    modal.show();
}
</script>

</body>
</html>
